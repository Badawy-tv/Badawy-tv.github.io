<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Google Map</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

h2{
margin:12px;
}

.map-container{
width:100%;
height:50vh;
position:relative;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:0;
}

</style>

</head>

<body>

<h2>📍 Live Map</h2>

<div class="map-container">

<canvas id="qiblaLine" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></canvas>
<iframe
src=""
allowfullscreen
loading="lazy">
</iframe>

</div>

</body>
</html>

<script>

const frame=document.querySelector("iframe")

function loadMap(lat,lon){

frame.src="https://www.google.com/maps?q="+lat+","+lon+"&z=17&output=embed"

}

/* FAST LOCATION DETECTION */

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

function(pos){

loadMap(
pos.coords.latitude,
pos.coords.longitude
)

},

function(){

/* fallback location */
frame.src="https://www.google.com/maps?q=0,0&z=2&output=embed"

},

{
enableHighAccuracy:true,
timeout:4000,
maximumAge:0
})

}

</script>


<script>

const kaabaLat = 21.4225
const kaabaLon = 39.8262

const canvas = document.getElementById("qiblaLine")
const ctx = canvas.getContext("2d")

function resizeCanvas(){
canvas.width = canvas.offsetWidth
canvas.height = canvas.offsetHeight
}

resizeCanvas()
window.addEventListener("resize",resizeCanvas)

function drawLine(angle){

ctx.clearRect(0,0,canvas.width,canvas.height)

const cx = canvas.width/2
const cy = canvas.height/2

const length = Math.max(canvas.width,canvas.height)

const rad = angle*Math.PI/180

const x = cx + length*Math.sin(rad)
const y = cy - length*Math.cos(rad)

ctx.beginPath()
ctx.moveTo(cx,cy)
ctx.lineTo(x,y)
ctx.lineWidth = 4
ctx.strokeStyle = "red"
ctx.stroke()

}

function calculateQibla(lat,lon){

const φ1 = lat*Math.PI/180
const φ2 = kaabaLat*Math.PI/180

const Δλ = (kaabaLon-lon)*Math.PI/180

const y = Math.sin(Δλ)
const x = Math.cos(φ1)*Math.tan(φ2) - Math.sin(φ1)*Math.cos(Δλ)

let θ = Math.atan2(y,x)*180/Math.PI

return (θ+360)%360

}

if(navigator.geolocation){

navigator.geolocation.watchPosition(function(pos){

const lat = pos.coords.latitude
const lon = pos.coords.longitude

const bearing = calculateQibla(lat,lon)

drawLine(bearing)

},{
enableHighAccuracy:true
})

}

</script>


<style>

#qiblaCompassSection{
text-align:center;
padding:30px 10px;
}

.compass-wrapper{
display:flex;
justify-content:center;
align-items:center;
margin-top:15px;
}

.compass{
position:relative;
width:260px;
height:260px;
border-radius:50%;
background:radial-gradient(circle,#f5f0d8,#c8b47a);
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.compass-ring{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
border:10px solid #b8973d;
box-shadow:inset 0 0 15px rgba(0,0,0,0.4);
background-image:
repeating-conic-gradient(#8b6f2a 0deg 5deg,#d4af37 5deg 10deg);
opacity:0.4;
}

.compass-arrow{
position:absolute;
top:50%;
left:50%;
width:6px;
height:120px;
background:red;
transform-origin:50% 90%;
transform:translate(-50%,-90%) rotate(0deg);
border-radius:4px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.kaaba{
position:absolute;
top:50%;
left:50%;
width:60px;
height:60px;
background:#111;
transform:translate(-50%,-50%);
border-radius:6px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.kaaba:before{
content:"";
position:absolute;
top:10px;
left:0;
width:100%;
height:10px;
background:gold;
}

</style>


<script>

const kaabaLat=21.4225
const kaabaLon=39.8262

let qiblaDirection=0

function calculateQibla(lat,lon){

const φ1=lat*Math.PI/180
const φ2=kaabaLat*Math.PI/180
const Δλ=(kaabaLon-lon)*Math.PI/180

const y=Math.sin(Δλ)
const x=Math.cos(φ1)*Math.tan(φ2)-Math.sin(φ1)*Math.cos(Δλ)

let θ=Math.atan2(y,x)*180/Math.PI
return (θ+360)%360

}

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

const lat=pos.coords.latitude
const lon=pos.coords.longitude

qiblaDirection=calculateQibla(lat,lon)

})

}

/* sensor compass */

window.addEventListener("deviceorientation",function(e){

let heading

if(e.webkitCompassHeading){
heading=e.webkitCompassHeading
}else if(e.alpha!==null){
heading=360-e.alpha
}else{
return
}

const rotation=qiblaDirection-heading

document.getElementById("compassArrow").style.transform=
"translate(-50%,-90%) rotate("+rotation+"deg)"

},true)

</script>
