<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Times</title>

<link rel="stylesheet" href="css/tools.css">

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:15px;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

#location{
text-align:center;
margin-bottom:15px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
text-align:center;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

th{
background:#eee;
}

.current{
background:#4caf50;
color:white;
font-weight:bold;
}

@media(max-width:600px){
th,td{
padding:8px;
font-size:14px;
}
}

</style>
</head>

<body>

<div class="container">

<h1>🕌 Prayer Times</h1>

<div id="location">Detecting location...</div>

<table>
<thead>
<tr>
<th>Prayer</th>
<th>Time</th>
</tr>
</thead>

<tbody id="prayerTable"></tbody>
</table>

</div>

<script>

const prayers=["Fajr","Dhuhr","Asr","Maghrib","Isha"];

function renderTable(timings){

const tbody=document.getElementById("prayerTable");
tbody.innerHTML="";

const now=new Date();
const current=now.getHours()*60+now.getMinutes();

prayers.forEach(p=>{

const time=timings[p];
const parts=time.split(":");

const minutes=parseInt(parts[0])*60+parseInt(parts[1]);

let row=document.createElement("tr");

if(current>=minutes && current<minutes+60){
row.className="current";
}

row.innerHTML="<td>"+p+"</td><td>"+time+"</td>";

tbody.appendChild(row);

});

}

function fetchTimes(lat,lon,label){

fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)
.then(r=>r.json())
.then(data=>{

document.getElementById("location").innerText="📍 "+label;

renderTable(data.data.timings);

})
.catch(()=>{

document.getElementById("location").innerText="Unable to load prayer times";

});

}

function getLocation(){

if(!navigator.geolocation){

fetchTimes(-1.286389,36.817223,"Nairobi, Kenya");
return;

}

navigator.geolocation.getCurrentPosition(

pos=>{

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

fetchTimes(lat,lon,"Your Location");

},

()=>{

fetchTimes(-1.286389,36.817223,"Nairobi, Kenya");

}

);

}

getLocation();

</script>

</body>
</html>
