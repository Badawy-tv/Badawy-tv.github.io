<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Google Map</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

h2{
margin:12px;
}

.map-container{
width:100%;
height:50vh;
position:relative;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:0;
}

</style>

</head>

<body>

<h2>📍 Live Map</h2>

<div class="map-container">

<iframe
src=""
allowfullscreen
loading="lazy">
</iframe>

</div>

</body>
</html>

<script>

const frame=document.querySelector("iframe")

function loadMap(lat,lon){

frame.src="https://www.google.com/maps?q="+lat+","+lon+"&z=17&output=embed"

}

/* FAST LOCATION DETECTION */

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

function(pos){

loadMap(
pos.coords.latitude,
pos.coords.longitude
)

},

function(){

/* fallback location */
frame.src="https://www.google.com/maps?q=0,0&z=2&output=embed"

},

{
enableHighAccuracy:true,
timeout:4000,
maximumAge:0
})

}

</script>
