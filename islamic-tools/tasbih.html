<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Tasbih</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:"Cairo",sans-serif;
background:
radial-gradient(circle at center,#0f2e23,#081510),
url("https://www.transparenttextures.com/patterns/arabesque.png");
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

h1{
font-family:"Amiri",serif;
color:gold;
margin-bottom:20px;
}

.ring{
position:relative;
width:260px;
height:260px;
}

.bead{
position:absolute;
width:16px;
height:16px;
background:#145c44;
border-radius:50%;
border:1px solid gold;
transition:0.2s;
}

.bead.active{
background:gold;
box-shadow:0 0 8px gold;
}

.center-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
border-radius:50%;
background:radial-gradient(circle,#1f3d30,#0a1a14);
border:3px solid gold;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
color:gold;
cursor:pointer;
}

.controls{
margin-top:25px;
}

button{
background:#145c44;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#1d7a5c;
}

.progress{
margin-top:10px;
color:gold;
}

</style>
</head>

<body>

<h1>Digital Tasbih</h1>

<div class="ring" id="ring"></div>

<div class="controls">
<button onclick="resetCounter()">Reset</button>
</div>

<div class="progress" id="progress"></div>

<audio id="clickSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c7e2f9f2e.mp3">
</audio>

<script>

const ring=document.getElementById("ring")
const progress=document.getElementById("progress")
const sound=document.getElementById("clickSound")

let beads=33
let count=0
let cycle=[33,33,34]
let cycleIndex=0
let target=cycle[cycleIndex]

const radius=110

for(let i=0;i<33;i++){

let bead=document.createElement("div")
bead.className="bead"

let angle=(i/33)*2*Math.PI

let x=130+radius*Math.cos(angle)
let y=130+radius*Math.sin(angle)

bead.style.left=x+"px"
bead.style.top=y+"px"

ring.appendChild(bead)

}

const btn=document.createElement("div")
btn.className="center-btn"
btn.innerText="0"

ring.appendChild(btn)

const beadEls=document.querySelectorAll(".bead")

function update(){

btn.innerText=count
progress.innerText="Dhikr "+(cycleIndex+1)+" : "+count+" / "+target

beadEls.forEach((b,i)=>{

if(i<count) b.classList.add("active")
else b.classList.remove("active")

})

localStorage.setItem("tasbihCount",count)

}

btn.onclick=function(){

count++

sound.currentTime=0
sound.play()

if(navigator.vibrate) navigator.vibrate(20)

if(count>=target){

cycleIndex++

if(cycleIndex>=cycle.length){
cycleIndex=0
}

target=cycle[cycleIndex]
count=0

}

update()

}

function resetCounter(){

count=0
cycleIndex=0
target=cycle[cycleIndex]
update()

}

const saved=localStorage.getItem("tasbihCount")

if(saved){
count=parseInt(saved)
}

update()

</script>

</body>
</html>
