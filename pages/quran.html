<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran Reader | BADAWY TV</title>

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/layout.css">
<link rel="stylesheet" href="../assets/css/responsive.css">

<style>
.quran-container{ max-width:900px; margin:auto; padding:20px; }
.quran-controls{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; align-items:center; }
.quran-controls select, .quran-controls button{ padding:8px 12px; border-radius:6px; border:1px solid #ccc; font-size:14px; }
.quran-controls select{ min-width:150px; }
.ayah{ margin-bottom:20px; }
.ayah-ar{ font-size:28px; text-align:right; line-height:2; direction:rtl; font-family: 'Scheherazade New', serif; }
.ayah-en{ font-size:16px; color:#555; margin-top:5px; text-align:left; direction:ltr; }
.ayah-number{ font-size:14px; color:#666; margin-left:10px; display:inline-block; vertical-align:middle; }
.ayah-play{ margin-right:8px; padding:4px 8px; border-radius:6px; border:1px solid #ccc; background:#f5f5f5; cursor:pointer; }
audio#quranPlayer{ width:100%; margin:16px 0; }
</style>

</head>
<body>

<div class="quran-container">

  <h1>Quran Reader</h1>

  <div class="quran-controls">
    <select id="surahSelect"></select>

    <select id="reciterSelect">
      <option value="ar.alafasy">Mishary Alafasy</option>
      <option value="ar.abdurrahmaansudais">Abdul Rahman Sudais</option>
      <option value="ar.husary">Mahmoud Al-Husary</option>
    </select>

    <button onclick="loadSurah()">Load Surah</button>
  </div>

  <audio id="quranPlayer" controls></audio>

  <div id="quranText"></div>

</div>

<script src="../assets/js/quran-reader.js"></script>
</body>
</html>
