<!DOCTYPE html>
<html>
<head>

<title>Tajweed Course</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

.header{
background:#0b5d3b;
color:white;
padding:25px;
text-align:center;
}

.progress-container{
width:90%;
margin:auto;
margin-top:20px;
}

.progress-bar{
height:12px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.progress{
height:12px;
background:#0b5d3b;
width:0%;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:30px;
}

.lesson{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.lesson a{
text-decoration:none;
font-weight:bold;
color:#0b5d3b;
font-size:18px;
}

.complete{
margin-top:10px;
}

@media(max-width:800px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:500px){
.grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="header">
<h1>Tajweed Course</h1>
<p>Learn Correct Quran Recitation</p>
</div>

<div class="progress-container">
<p>Course Progress</p>
<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>
</div>

<div class="grid" id="lessons"></div>

<script>

const totalLessons = 23
const container = document.getElementById("lessons")

for(let i=1;i<=totalLessons;i++){

let completed = localStorage.getItem("lesson"+i)

container.innerHTML += `
<div class="lesson">
<a href="lesson${i}.html">Lesson ${i}</a>
<div class="complete">
<label>
<input type="checkbox" ${completed?"checked":""}
onchange="toggleComplete(${i},this)">
Completed
</label>
</div>
</div>
`
}

function toggleComplete(num,box){

if(box.checked){
localStorage.setItem("lesson"+num,true)
}else{
localStorage.removeItem("lesson"+num)
}

updateProgress()
}

function updateProgress(){

let done = 0

for(let i=1;i<=totalLessons;i++){
if(localStorage.getItem("lesson"+i)) done++
}

let percent = (done/totalLessons)*100

document.getElementById("progress").style.width = percent+"%"

}

updateProgress()

</script>

</body>
</html>
