<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Sighting</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { display: block; }
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
</head>
<body><div id="moon-container" style="width:100%; height:600px;"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script>
  // Scene setup
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 3;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Moon geometry and material
  const geometry = new THREE.SphereGeometry(1, 64, 64);
  const textureLoader = new THREE.TextureLoader();
  const moonTexture = textureLoader.load('https://threejs.org/examples/textures/moon.jpg'); 
  const moon = new THREE.Mesh(
    geometry,
    new THREE.MeshStandardMaterial({ map: moonTexture, roughness: 1, metalness: 0 })
  );
  scene.add(moon);

  // Lights
  const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
  directionalLight.position.set(5, 3, 5);
  scene.add(directionalLight);

  const ambientLight = new THREE.AmbientLight(0x222222);
  scene.add(ambientLight);

  // Fetch current moon phase and illumination
  async function updateMoonPhase() {
    try {
      const now = new Date();
      // Using a free astronomy API: https://api.farmsense.net/v1/moonphases/
      const response = await fetch(`https://api.farmsense.net/v1/moonphases/?d=${Math.floor(now.getTime()/1000)}`);
      const data = await response.json();
      const phase = data[0].Phase; // "Full Moon", "New Moon", etc.
      const illumination = data[0].Illumination; // fraction 0–1
      const angle = data[0].Age/29.53 * 2 * Math.PI; // simple lunar age -> angle

      // Move directional light around moon to match phase
      directionalLight.position.x = 5 * Math.cos(angle);
      directionalLight.position.z = 5 * Math.sin(angle);

      // Adjust brightness for partial phases
      directionalLight.intensity = 0.5 + illumination * 0.5;
    } catch(e) {
      console.error("Failed to fetch moon phase:", e);
    }
  }

  updateMoonPhase();
  setInterval(updateMoonPhase, 60000); // update every minute

  // Animate moon rotation
  function animate() {
    requestAnimationFrame(animate);
    moon.rotation.y += 0.002;
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
<script>
async function initMoon() {
  const container = document.getElementById("moon-container");
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);

  const geometry = new THREE.SphereGeometry(1, 64, 64);
  const material = new THREE.MeshPhongMaterial({ color: 0xffffff });
  const moon = new THREE.Mesh(geometry, material);
  scene.add(moon);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5,5,5);
  scene.add(light);

  camera.position.z = 3;

  async function updatePhase() {
    try {
      const res = await fetch("https://api.farmsense.net/v1/moonphases/?d=" + Math.floor(Date.now()/1000));
      const data = await res.json();
      const phase = data[0].Phase; // 0 = New, 1 = Waxing, etc.
      // Simple dynamic shading
      material.color.setHSL(0,0,0.5 + 0.5*Math.sin(phase*Math.PI/4));
    } catch(e){ console.error(e); }
  }

  function animate() {
    requestAnimationFrame(animate);
    moon.rotation.y += 0.001;
    renderer.render(scene, camera);
  }

  await updatePhase();
  animate();
}
initMoon();
</script>
