<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Holy Quran | Badawy TV</title>

<link rel="stylesheet" href="../assets/css/mushaf.css">

<script src="../assets/js/pageflip.js"></script>
<script src="../assets/js/quran-search.js"></script>

</head>

<body>

<div class="controls">

<button onclick="prevPage()">⬅</button>
<button onclick="nextPage()">➡</button>

<input id="search" placeholder="Search Quran">

</div>

<div id="book"></div>

<script>

const book=document.getElementById("book")

for(let i=1;i<=604;i++){

let p=document.createElement("div")
p.className="page"

let img=document.createElement("img")
img.src="../assets/quran/pages/"+String(i).padStart(3,"0")+".jpg"

p.appendChild(img)

book.appendChild(p)

}

const flip=new St.PageFlip(book,{
width:550,
height:800,
size:"stretch",
maxShadowOpacity:0.5,
showCover:true,
mobileScrollSupport:true
})

flip.loadFromHTML(document.querySelectorAll(".page"))

function nextPage(){
flip.flipNext()
}

function prevPage(){
flip.flipPrev()
}

</script>

</body>
</html>
