function drawLine(angle){

ctx.clearRect(0,0,canvas.width,canvas.height)

const cx = canvas.width/2
const cy = canvas.height/2

const length = Math.max(canvas.width,canvas.height)

const rad = angle*Math.PI/180

const x = cx + length*Math.sin(rad)
const y = cy - length*Math.cos(rad)

ctx.beginPath()
ctx.moveTo(cx,cy)
ctx.lineTo(x,y)
ctx.lineWidth = 4
ctx.strokeStyle = "red"
ctx.stroke()

}
