<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Certificate Request</title>

<style>
body{
font-family:serif;
background:#f4f6f8;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

/* CERTIFICATE DESIGN */
#certificate{
width:1000px;
height:700px;
padding:40px;
position:absolute;
left:-9999px;
background:white;
border:10px double #bfa046;
}

.gold{
color:#bfa046;
font-weight:bold;
}

.name{
font-size:36px;
font-weight:bold;
margin:20px 0;
}

.signature{
margin-top:60px;
text-align:right;
}

.watermark{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:0.05;
font-size:40px;
display:flex;
flex-wrap:wrap;
justify-content:center;
align-items:center;
transform:rotate(-30deg);
}

.watermark span{
margin:20px;
}
</style>
</head>

<body>

<div class="container">
<h2>Apply for Certificate</h2>

<input id="name" placeholder="Full Name"><br>
<input id="dob" type="date"><br>

<button onclick="startProcess()">Submit</button>

<p id="status"></p>

<button id="downloadBtn" onclick="downloadCert()" style="display:none;">
Get Certificate
</button>
</div>

<!-- CERTIFICATE TEMPLATE -->
<div id="certificate">

<div class="watermark" id="wm"></div>

<h1 class="gold" style="text-align:center;font-size:40px;">
BADAWY TV
</h1>

<h2 style="text-align:center;">
Tajweed Mastery Certificate
</h2>

<p style="text-align:center;">
This certifies that
</p>

<div class="name" id="certName" style="text-align:center;"></div>

<p style="text-align:center;">
has successfully completed the Tajweed Course
</p>

<p style="text-align:center;" id="certDate"></p>

<p style="text-align:center;" id="certId"></p>

<div class="signature">
<p style="font-family:cursive;font-size:24px;">
Ahmad Badawy
</p>
<hr>
<p>Instructor</p>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

function startProcess(){
document.getElementById("status").innerText =
"Please wait 5 minutes while your credentials are being validated...";

setTimeout(()=>{
document.getElementById("status").innerText =
"Your certificate is ready. Click below.";
document.getElementById("downloadBtn").style.display="block";
},5000);
}

function generateWatermark(){
let wm = document.getElementById("wm");
for(let i=0;i<50;i++){
let span = document.createElement("span");
span.innerText="Tajweed Mastery Certificate";
wm.appendChild(span);
}
}

generateWatermark();

function downloadCert(){

const name = document.getElementById("name").value;
const date = new Date().toLocaleDateString();
const id = "TJD-"+Math.floor(Math.random()*1000000);

document.getElementById("certName").innerText = name;
document.getElementById("certDate").innerText = "Date: "+date;
document.getElementById("certId").innerText = "Certificate ID: "+id;

html2canvas(document.getElementById("certificate")).then(canvas => {

const img = canvas.toDataURL("image/png");
const { jsPDF } = window.jspdf;
const pdf = new jsPDF("landscape");

pdf.addImage(img, 'PNG', 10, 10, 270, 180);
pdf.save("Certificate-"+name+".pdf");

});
}

</script>

</body>
</html>
