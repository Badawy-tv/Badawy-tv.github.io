<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
text-align:center;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{

}

#location{
margin-bottom:20px;
font-weight:bold;
}

/* Compass */

.compass{
width:260px;
height:260px;
margin:auto;
position:relative;
border-radius:50%;
background:
radial-gradient(circle,#fff 60%,#e6d3a3 61%);
border:8px solid #c8a96a;
}

/* Islamic decoration ring */

.compass:before{
content:"";
position:absolute;
top:-12px;
left:-12px;
right:-12px;
bottom:-12px;
border-radius:50%;
border:4px dashed #c8a96a;
}

/* Direction labels */

.dir{
position:absolute;
font-weight:bold;
font-size:16px;
}

.n{top:-25px;left:50%;transform:translateX(-50%);}
.s{bottom:-25px;left:50%;transform:translateX(-50%);}
.e{right:-25px;top:50%;transform:translateY(-50%);}
.w{left:-25px;top:50%;transform:translateY(-50%);}

/* Arrow */

.arrow{
position:absolute;
top:50%;
left:50%;
width:0;
height:0;
border-left:12px solid transparent;
border-right:12px solid transparent;
border-bottom:100px solid #2e7d32;
transform-origin:50% 100%;
transform:translate(-50%,-100%) rotate(0deg);
transition:transform 0.4s ease;
}

/* center dot */

.center{
width:14px;
height:14px;
background:#444;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.direction{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

<script>

const KAABA_LAT=21.4225;
const KAABA_LON=39.8262;

/* convert */

function toRad(d){return d*Math.PI/180;}
function toDeg(r){return r*180/Math.PI;}

/* qibla calculation */

function getQibla(lat,lon){

const φ1=toRad(lat);
const φ2=toRad(KAABA_LAT);
const Δλ=toRad(KAABA_LON-lon);

const y=Math.sin(Δλ)*Math.cos(φ2);
const x=Math.cos(φ1)*Math.sin(φ2)-
Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);

let θ=Math.atan2(y,x);

θ=toDeg(θ);

return (θ+360)%360;

}

/* compass update */

function startCompass(qibla){

if(window.DeviceOrientationEvent){

window.addEventListener("deviceorientation",function(e){

let heading=e.alpha;

if(heading===null) return;

let rotate=qibla-heading;

document.getElementById("arrow").style.transform=
"translate(-50%,-100%) rotate("+rotate+"deg)";

});

}

}

/* fallback rotation (desktop) */

function showStatic(qibla){

document.getElementById("arrow").style.transform=
"translate(-50%,-100%) rotate("+qibla+"deg)";

}

/* start */

function start(){

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

document.getElementById("location").innerText="📍 Your Location";

const qibla=getQibla(lat,lon);

document.getElementById("directionText").innerText=
"Qibla: "+qibla.toFixed(1)+"°";

startCompass(qibla);
showStatic(qibla);

},()=>{

/* fallback Nairobi */

const lat=-1.286389;
const lon=36.817223;

document.getElementById("location").innerText=
"📍 Default: Nairobi";

const qibla=getQibla(lat,lon);

document.getElementById("directionText").innerText=
"Qibla: "+qibla.toFixed(1)+"°";

showStatic(qibla);

});

}

start();

</script>
