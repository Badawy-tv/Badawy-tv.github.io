<!DOCTYPE html>
<html>
<head>
  <title>Apply for Tajweed Certificate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; text-align:center; padding:50px; background:#f4f6f8; }
    h2 { color:#0b5d3b; }
    button { padding:15px 25px; font-size:18px; background:#0b5d3b; color:white; border:none; border-radius:8px; cursor:pointer; }
    #payment-status { margin-top:20px; font-weight:bold; }
  </style>
</head>
<body>

<h2>Apply for Your Tajweed Certificate</h2>
<p>Click the button below to pay and receive your certificate.</p>

<button id="pay-button">💳 Apply Certificate</button>
<div id="payment-status"></div>

<script>
document.getElementById("pay-button").addEventListener("click", async () => {
    const status = document.getElementById("payment-status");
    status.innerText = "Processing payment...";
    
    try {
        const res = await fetch("http://localhost:3000/pay-certificate", { method: "POST" });
        const data = await res.json();
        
        if(data.success){
            status.innerText = "Payment initiated! Check your phone to approve the transaction.";
        } else {
            status.innerText = "Error: " + data.message;
        }
    } catch(err){
        status.innerText = "Network error. Backend server may not be running.";
    }
});
</script>

</body>
</html>
