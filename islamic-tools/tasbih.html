<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Tasbih</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:"Cairo",sans-serif;
background:linear-gradient(180deg,#0b1d16,#0f2e23);
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

h1{
font-family:"Amiri",serif;
color:gold;
margin-bottom:20px;
}

.counter{
width:220px;
height:220px;
border-radius:50%;
background:radial-gradient(circle,#1f3d30,#0a1a14);
border:4px solid gold;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
color:gold;
box-shadow:0 0 30px rgba(0,0,0,0.6);
cursor:pointer;
}

.controls{
margin-top:20px;
display:flex;
gap:10px;
}

button{
background:#145c44;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#1d7a5c;
}

select{
margin-top:20px;
padding:8px;
border-radius:6px;
border:none;
}

.progress{
margin-top:15px;
font-size:14px;
color:gold;
}

</style>
</head>

<body>

<h1>Digital Tasbih</h1>

<select id="dhikrSelect">
<option value="33">SubhanAllah (33)</option>
<option value="33">Alhamdulillah (33)</option>
<option value="34">Allahu Akbar (34)</option>
<option value="100">SubhanAllah wa bihamdihi (100)</option>
<option value="9999">Free Count</option>
</select>

<div class="counter" id="counter">0</div>

<div class="progress" id="progress"></div>

<div class="controls">
<button onclick="resetCounter()">Reset</button>
</div>

<script>

let count=0
let target=33

const counter=document.getElementById("counter")
const progress=document.getElementById("progress")

function update(){

counter.textContent=count
progress.textContent=count+" / "+target

localStorage.setItem("tasbihCount",count)

}

counter.addEventListener("click",function(){

count++

if(navigator.vibrate) navigator.vibrate(30)

if(count>target) count=target

update()

})

function resetCounter(){

count=0
update()

}

document.getElementById("dhikrSelect").addEventListener("change",function(){

target=parseInt(this.value)
count=0
update()

})

const saved=localStorage.getItem("tasbihCount")

if(saved){
count=parseInt(saved)
}

update()

</script>

</body>
</html>
