<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Imam</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
  .card { 
    width:75%; 
    max-width:900px; 
    margin:20px auto; 
    padding:20px; 
    border-radius:12px; 
    border:1px solid #ddd; 
    background:#f9f9f9; 
    text-align:center;
  }
  .card input, .card textarea {
    width:90%; 
    padding:10px; 
    margin:10px 0; 
    border-radius:6px; 
    border:1px solid #ccc;
  }
  .card button {
    padding:10px 20px; 
    margin:5px; 
    border:none; 
    border-radius:6px; 
    background:#1e90ff; 
    color:white; 
    font-weight:bold; 
    cursor:pointer;
  }
</style>
</head>
<body>
<div class="card">
  <h3>Ask Imam</h3>
  <p>Have a question about Islamic family guidance? Submit it below and get answers via Email or WhatsApp.</p>
  <form id="ask-imam-form">
    <input type="text" name="name" placeholder="Your Name" required><br>
    <input type="email" name="email" placeholder="Your Email" required><br>
    <input type="text" name="phone" placeholder="Phone Number (for WhatsApp)" required><br>
    <textarea name="question" rows="4" placeholder="Your Question" required></textarea><br>
    <button type="button" id="send-email">Send via Email</button>
    <button type="button" id="send-whatsapp">Send via WhatsApp</button>
  </form>
</div>
<script>
document.getElementById("send-email").addEventListener("click", function(){
  const form = document.getElementById("ask-imam-form");
  const name = form.querySelector("input[name=name]").value;
  const email = form.querySelector("input[name=email]").value;
  const phone = form.querySelector("input[name=phone]").value;
  const question = form.querySelector("textarea[name=question]").value;
  const message = `Assalamu Alaikum Warahmatullahi Wabarakatuh,%0A%0AName: ${name}%0AEmail: ${email}%0APhone: ${phone}%0AQuestion: ${question}`;
  window.location.href = `mailto:ahmedbadawy786@gmail.com?subject=Ask Imam Question&body=${message}`;
});
document.getElementById("send-whatsapp").addEventListener("click", function(){
  const form = document.getElementById("ask-imam-form");
  const name = form.querySelector("input[name=name]").value;
  const email = form.querySelector("input[name=email]").value;
  const phone = form.querySelector("input[name=phone]").value;
  const question = form.querySelector("textarea[name=question]").value;
  const message = `Assalamu Alaikum Warahmatullahi Wabarakatuh,%0A%0AName: ${name}%0AEmail: ${email}%0APhone: ${phone}%0AQuestion: ${question}`;
  window.open(`https://wa.me/254716802090?text=${message}`, "_blank");
});
</script>
</body>
</html>
