<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moon Sighting</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Moon geometry & material
let geometry = new THREE.SphereGeometry(1, 64, 64);
let material = new THREE.MeshPhongMaterial({ color: 0xffffff, flatShading: true });
let moon = new THREE.Mesh(geometry, material);
scene.add(moon);

// Lighting
let directionalLight = new THREE.DirectionalLight(0xffffff, 1);
scene.add(directionalLight);
scene.add(new THREE.AmbientLight(0x222222));

camera.position.z = 3;

// Fetch real moon phase & angle
async function updateMoon() {
  try {
    // Get current UTC date/time
    let now = new Date();
    // Use USNO API for moon phase & altitude (angle)
    let res = await fetch(`https://api.farmsense.net/v1/moonphases/?d=${Math.floor(now.getTime()/1000)}`);
    let data = await res.json();
    let phase = data[0].Phase; // e.g., "Full Moon"

    // Map phase to light intensity
    let phases = {
      "New Moon": 0.1,
      "Waxing Crescent": 0.5,
      "First Quarter": 0.7,
      "Waxing Gibbous": 0.9,
      "Full Moon": 1.0,
      "Waning Gibbous": 0.9,
      "Last Quarter": 0.7,
      "Waning Crescent": 0.5
    };
    directionalLight.intensity = phases[phase] || 0.5;

    // Optional: tilt moon according to azimuth/altitude if API provides
    // Example rotation (for demo, actual angle should come from a precise astronomy API)
    moon.rotation.x = Math.PI / 6;  // tilt
    moon.rotation.z = Math.PI / 12; // rotation to match moon orientation

  } catch(e) {
    console.error("Moon API fetch failed", e);
    directionalLight.intensity = 0.5;
  }
}

// Animate rotation
function animate() {
  requestAnimationFrame(animate);
  moon.rotation.y += 0.002;
  renderer.render(scene, camera);
}

updateMoon();
animate();

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
