<p><strong>Arabic:</strong></p>
<p style="font-size:22px;">اللَّهُمَّ اكْفِنِي بِحَلَالِكَ عَنْ حَرَامِكَ</p>

<p><strong>Translation:</strong></p>
<p>O Allah suffice me with what You made lawful.</p>
