<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holy Quran | Badawy TV</title>

<link rel="stylesheet" href="../../assets/quran/css/style.css">

<style>

body{
margin:0;
background:#e8e2c8;
font-family:serif;
text-align:center;
}

#book{
width:95%;
max-width:900px;
margin:auto;
margin-top:20px;
}

.page{
background:white;
width:100%;
height:100%;
}

.page img{
width:100%;
height:auto;
}

.controls{
margin-top:10px;
}

button{
padding:8px 12px;
margin:5px;
font-size:16px;
}

</style>
</head>

<body>

<h2>📖 Holy Quran</h2>

<div id="book"></div>

<div class="controls">

<button onclick="flip.prev()">⬅ Previous</button>

<button onclick="flip.next()">Next ➡</button>

<button onclick="toggleNight()">🌙 Night</button>

</div>

<audio id="audio" controls style="width:90%;margin-top:10px;"></audio>

<script src="../../assets/quran/js/pageflip.js"></script>

<script>

const book=document.getElementById("book")

for(let i=1;i<=604;i++){

let page=document.createElement("div")
page.className="page"

let img=document.createElement("img")
img.src="../../assets/quran/pages/"+i+".jpg"

page.appendChild(img)

book.appendChild(page)

}

const flip=new St.PageFlip(book,{
width:600,
height:800,
size:"stretch",
showCover:false,
mobileScrollSupport:true
})

flip.loadFromHTML(document.querySelectorAll(".page"))

function toggleNight(){

document.body.classList.toggle("dark")

if(document.body.classList.contains("dark")){
document.body.style.background="#111"
document.body.style.color="#eee"
}else{
document.body.style.background="#e8e2c8"
document.body.style.color="#000"
}

}

</script>

</body>
</html>
