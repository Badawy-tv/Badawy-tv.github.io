<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qibla Direction</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Cairo",sans-serif;
background:linear-gradient(180deg,#0b1d16,#0f2e23);
color:#f5f5f5;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

header{
width:100%;
padding:30px 20px;
text-align:center;
background:linear-gradient(90deg,#0f3b2e,#145c44);
border-bottom:2px solid rgba(255,215,0,0.4);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

header h1{
font-family:"Amiri",serif;
font-size:32px;
letter-spacing:1px;
color:gold;
}

header p{
margin-top:8px;
font-size:15px;
opacity:0.85;
}

.main-container{
width:100%;
max-width:900px;
padding:40px 20px;
}

.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,215,0,0.25);
border-radius:16px;
padding:30px;
margin-bottom:30px;
backdrop-filter:blur(8px);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.card h2{
font-family:"Amiri",serif;
color:gold;
margin-bottom:15px;
font-size:24px;
}

.pattern-divider{
width:100%;
height:2px;
background:linear-gradient(90deg,transparent,gold,transparent);
margin:25px 0;
}

.info-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-top:20px;
}

.info-box{
background:rgba(0,0,0,0.35);
border-radius:10px;
padding:20px;
text-align:center;
border:1px solid rgba(255,215,0,0.25);
}

.info-box span{
display:block;
font-size:14px;
opacity:0.8;
margin-bottom:6px;
}

.info-box strong{
font-size:18px;
color:gold;
}

footer{
margin-top:auto;
width:100%;
text-align:center;
padding:20px;
font-size:13px;
background:#0a1a14;
border-top:1px solid rgba(255,215,0,0.3);
opacity:0.8;
}

</style>
</head>

<body>

<header>
<h1>Qibla Direction Tool</h1>
<p>Find the direction of prayer from anywhere in the world</p>
</header>

<div class="main-container">

<div class="card">
<h2>Location Information</h2>
<div class="pattern-divider"></div>

<div class="info-grid">

<div class="info-box">
<span>Your Latitude</span>
<strong id="latValue">--</strong>
</div>

<div class="info-box">
<span>Your Longitude</span>
<strong id="lonValue">--</strong>
</div>

<div class="info-box">
<span>City</span>
<strong id="cityValue">--</strong>
</div>

<div class="info-box">
<span>Country</span>
<strong id="countryValue">--</strong>
</div>

</div>
</div>

<div class="card">
<h2>Qibla Direction</h2>
<div class="pattern-divider"></div>

<p style="text-align:center;opacity:0.8;">
<div id="qibla-compass-container" style="display:flex;justify-content:center;margin-top:30px;">
<div id="compass" style="position:relative;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,#1f3d30,#0a1a14);border:4px solid gold;box-shadow:0 0 25px rgba(0,0,0,0.6);">

<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:gold;font-size:14px;">N</div>
<div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);color:gold;font-size:14px;">S</div>
<div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:gold;font-size:14px;">W</div>
<div style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:gold;font-size:14px;">E</div>

<div id="compassArrow" style="position:absolute;top:50%;left:50%;width:6px;height:120px;background:red;border-radius:3px;transform-origin:50% 90%;transform:translate(-50%,-90%) rotate(0deg);box-shadow:0 0 10px red;"></div>

<div style="position:absolute;top:50%;left:50%;width:60px;height:60px;background:#111;transform:translate(-50%,-50%);border-radius:6px;border:2px solid gold;"></div>

</div>
</div>

<div style="text-align:center;margin-top:15px;font-size:14px;color:gold;">
Direction updates as you rotate your phone
</div>
</p>

</div>

</div>

<footer>
Islamic Tools Platform
</footer>

</body>
</html>

<script>

const kaabaLat = 21.4225;
const kaabaLon = 39.8262;

let qiblaDirection = 0;

function calculateQibla(lat,lon){

const φ1 = lat*Math.PI/180;
const φ2 = kaabaLat*Math.PI/180;
const Δλ = (kaabaLon-lon)*Math.PI/180;

const y = Math.sin(Δλ);
const x = Math.cos(φ1)*Math.tan(φ2)-Math.sin(φ1)*Math.cos(Δλ);

let θ = Math.atan2(y,x)*180/Math.PI;

return (θ+360)%360;

}

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

const lat = pos.coords.latitude;
const lon = pos.coords.longitude;

document.getElementById("latValue").textContent = lat.toFixed(5);
document.getElementById("lonValue").textContent = lon.toFixed(5);

qiblaDirection = calculateQibla(lat,lon);

});

}

window.addEventListener("deviceorientation",function(e){

let heading;

if(e.webkitCompassHeading){
heading = e.webkitCompassHeading;
}else if(e.alpha !== null){
heading = 360 - e.alpha;
}else{
return;
}

const rotation = qiblaDirection - heading;

const arrow = document.getElementById("compassArrow");

if(arrow){
arrow.style.transform =
"translate(-50%,-90%) rotate("+rotation+"deg)";
}

},true);

</script>
