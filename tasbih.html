<body>
<h1>Digital Tasbih</h1>
<div class="subtitle">Tap the center to count</div>
<div class="ring" id="ring"></div>
<div class="controls"><button onclick="resetTasbih()">Reset</button></div>
<div class="progress" id="progress"></div>
<div class="dhikrName" id="dhikrName"></div>
<audio id="click"><source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c7e2f9f2e.mp3"/></audio>
<script>





    const ring=document.getElementById("ring")
    const progress=document.getElementById("progress")
    const dhikrName=document.getElementById("dhikrName")
    const click=document.getElementById("click")

    const dhikrCycle=[
    {name:"SubhanAllah",count:33},
    {name:"Alhamdulillah",count:33},
    {name:"Allahu Akbar",count:34}
    ]

    let cycleIndex=0
    let target=dhikrCycle[0].count
    let count=0

    const radius=130

    for(let i=0;i<33;i++){

    let bead=document.createElement("div")
    bead.className="bead"

    let angle=(i/33)*2*Math.PI

    let x=150+radius*Math.cos(angle)
    let y=150+radius*Math.sin(angle)

    bead.style.left=x+"px"
    bead.style.top=y+"px"

    ring.appendChild(bead)

    }

    const center=document.createElement("div")
    center.className="center"
    center.innerText="0"

    ring.appendChild(center)

    const beads=document.querySelectorAll(".bead")

    function update(){

    center.innerText=count

    progress.innerText=count+" / "+target
    dhikrName.innerText=dhikrCycle[cycleIndex].name

    beads.forEach((b,i)=>{

    if(i<count) b.classList.add("active")
    else b.classList.remove("active")

    })

    localStorage.setItem("tasbihCount",count)
    localStorage.setItem("tasbihCycle",cycleIndex)

    }

    center.onclick=function(){

    count++

    click.currentTime=0
    click.play()

    if(navigator.vibrate) navigator.vibrate(20)

    if(count>=target){

    cycleIndex++

    if(cycleIndex>=dhikrCycle.length){
    cycleIndex=0
    }

    target=dhikrCycle[cycleIndex].count
    count=0

    }

    update()

    }

    function resetTasbih(){

    count=0
    cycleIndex=0
    target=dhikrCycle[0].count
    update()

    }

    const savedCount=localStorage.getItem("tasbihCount")
    const savedCycle=localStorage.getItem("tasbihCycle")

    if(savedCount){
    count=parseInt(savedCount)
    }

    if(savedCycle){
    cycleIndex=parseInt(savedCycle)
    target=dhikrCycle[cycleIndex].count
    }

    update()

</script>
