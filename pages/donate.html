<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Badawy TV</title>
<style>
body { font-family: Arial, sans-serif; line-height:1.6; background:#f9f9f9; padding:20px; }
.payment-card { max-width:600px; margin:0 auto; background:#e8f5ef; padding:30px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.08); text-align:center; }
textarea, input[type=text], input[type=file] { width:100%; padding:10px; margin-top:10px; border-radius:6px; border:1px solid #ccc; }
button { padding:10px 20px; border:none; border-radius:6px; font-weight:bold; color:white; cursor:pointer; }
#submitBtn { background:#ccc; cursor:not-allowed; }
#submitBtn.enabled { background:#0a7a4b; cursor:pointer; }
.success-message { display:none; margin-top:15px; padding:15px; background:#dff0d8; border-left:5px solid #0a7a4b; border-radius:6px; color:#0a7a4b; font-weight:bold; }
#certificateArea { margin-top:20px; display:none; text-align:left; padding:15px; border-left:5px solid #0a7a4b; border-radius:6px; background:#e8f5ef; }
</style>
</head>
<body>

<div id="certificateArea">
        <h3>🏆 Your Certificate</h3>
        <p id="certificateText"></p>
    </div>

    <!-- Feature / Certificate Submission Form -->
    <h2>💡 Suggest a Feature / Send Certificate</h2>
    <form id="featureForm">
        <input type="text" id="name" placeholder="Your Name" required><br><br>
        <input type="text" id="phone" placeholder="Your Phone Number" required><br><br>
        <input type="file" id="certFile" accept=".txt,.pdf"><br><br>
        <textarea id="feature" rows="4" placeholder="What feature would you like us to add?" required></textarea><br><br>

        <input type="checkbox" id="terms"> <label for="terms"><a href="/legal/terms.html" target="_blank">Terms & Conditions</a></label><br>
        <input type="checkbox" id="privacy"> <label for="privacy"><a href="/legal/privacy.html" target="_blank">Privacy Policy</a></label><br><br>

        <button type="button" id="submitBtn">Submit</button>
    </form>

    <div class="success-message" id="successMessage">
        ✅ Thank you! Our review team will confirm your submission within 24 hours.
    </div>
</div>

<script>
// Copy recipient number
function copyNumber() {
    navigator.clipboard.writeText("0716 802090").then(()=>alert("Number copied to clipboard!"));
}

// Generate certificate (works for any pasted statement)
function generateCertificate() {
    const statement = document.getElementById('mpesaStatement').value;
    const now = new Date();
    document.getElementById('certificateText').textContent =
        `🏆 You have successfully received an award certificate from Badawy TV for supporting the channel! We may like to hear your feature requests for the website/app. Generated at ${now.toLocaleString()}`;
    document.getElementById('certificateArea').style.display='block';
}

// Terms & Privacy toggle for submit button
const submitBtn = document.getElementById('submitBtn');
const termsCheckbox = document.getElementById('terms');
const privacyCheckbox = document.getElementById('privacy');

function toggleSubmit() {
    if(termsCheckbox.checked && privacyCheckbox.checked){
        submitBtn.classList.add('enabled');
        submitBtn.disabled = false;
    } else {
        submitBtn.classList.remove('enabled');
        submitBtn.disabled = true;
    }
}
termsCheckbox.addEventListener('change', toggleSubmit);
privacyCheckbox.addEventListener('change', toggleSubmit);

// Submit feature/certificate form
submitBtn.addEventListener('click', function(){
    if(!submitBtn.classList.contains('enabled')) {
        alert("Please accept Terms & Privacy first");
        return;
    }
    const formData = new FormData();
    formData.append('name', document.getElementById('name').value);
    formData.append('phone', document.getElementById('phone').value);
    formData.append('feature', document.getElementById('feature').value);
    const certFile = document.getElementById('certFile').files[0];
    if(certFile) formData.append('certificate', certFile);

    fetch('https://formsubmit.co/badawytv76@gmail.com', {
        method:'POST',
        body: formData
    }).then(res => {
        if(res.ok){
            document.getElementById('successMessage').style.display='block';
            document.getElementById('featureForm').reset();
            toggleSubmit();
        }
    }).catch(err=> alert('❌ Could not submit: '+err));
});
</script>
</body>
</html>
