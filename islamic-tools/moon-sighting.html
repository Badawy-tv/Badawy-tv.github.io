<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moon Sighting</title>
<style>
  body { margin: 0; background: #000; display:flex; justify-content:center; align-items:center; height:100vh; }
  #moon-container { width: 300px; height: 300px; }
</style>
</head>
<body>
<div id="moon-container"></div>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
const container = document.getElementById('moon-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// Moon geometry
const geometry = new THREE.SphereGeometry(1, 64, 64);
const material = new THREE.MeshPhongMaterial({ color: 0xffffff, flatShading: false });
const moon = new THREE.Mesh(geometry, material);
scene.add(moon);

// Lights
const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
scene.add(directionalLight);
scene.add(new THREE.AmbientLight(0x222222));

camera.position.z = 3;

// Fetch real moon phase and map illumination
async function updateMoon() {
  try {
    const now = new Date();
    const timestamp = Math.floor(now.getTime()/1000);
    const res = await fetch(`https://api.farmsense.net/v1/moonphases/?d=${timestamp}`);
    const data = await res.json();
    const phaseName = data[0].Phase;

    // Moon illumination fraction
    const phaseFractions = {
      "New Moon": 0,
      "Waxing Crescent": 0.25,
      "First Quarter": 0.5,
      "Waxing Gibbous": 0.75,
      "Full Moon": 1,
      "Waning Gibbous": 0.75,
      "Last Quarter": 0.5,
      "Waning Crescent": 0.25
    };
    const illum = phaseFractions[phaseName] || 0.5;

    // Adjust light to simulate the phase
    directionalLight.intensity = illum;
    directionalLight.position.set(-1 + illum*2, 1, 2);

    moon.rotation.x = Math.PI / 6;
    moon.rotation.z = Math.PI / 12;

  } catch(e) {
    console.error("Moon API fetch failed", e);
    directionalLight.intensity = 0.5;
  }
}

// Animate rotation
function animate() {
  requestAnimationFrame(animate);
  moon.rotation.y += 0.002;
  renderer.render(scene, camera);
}

updateMoon();
animate();

// Resize
window.addEventListener('resize', () => {
  renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
