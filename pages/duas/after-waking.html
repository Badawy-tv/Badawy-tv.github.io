<h1>After Waking</h1>

<p><strong>Arabic:</strong></p>
<p style="font-size:22px;">الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُور</p>

<p><strong>Translation:</strong></p>
<p>All praise is for Allah who gave us life after causing us to die.</p>

<p><strong>Reference:</strong> Bukhari 6312</p>
