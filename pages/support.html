<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Badawy TV</title>
<style>
body { font-family: Arial, sans-serif; line-height:1.6; background:#f9f9f9; padding:20px; }
.payment-card { text-align:center; padding:30px; background:#e8f5ef; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.08); max-width:600px; margin:0 auto; }
.steps { text-align:left; margin:0 auto; max-width:500px; line-height:1.8; }
.steps h4 { color:#0a7a4b; border-bottom:2px solid #0a7a4b; padding-bottom:5px; margin-bottom:15px; }
.steps ol { counter-reset: step; padding-left:0; }
.steps li { list-style:none; margin-bottom:12px; position:relative; padding-left:40px; }
.steps li span { position:absolute; left:0; top:0; background:#0a7a4b; color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; }
#certificateArea { margin-top:20px; display:none; }
#featureForm textarea { width:100%; padding:10px; margin-top:10px; border-radius:6px; border:1px solid #ccc; }
#submitBtn { background:#ccc; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:not-allowed; }
#submitBtn.enabled { background:#0a7a4b; cursor:pointer; }
.success-message { display:none; margin-top:15px; padding:15px; background:#dff0d8; border-left:5px solid #0a7a4b; border-radius:6px; color:#0a7a4b; font-weight:bold; }
</style>
</head>
<div class="payment-card">
    <h1>🤲 Support Badawy TV</h1>
    <p>Your support helps maintain and improve <strong>Badawy TV</strong>. Contributions enable new features and help launch the official app.</p>

    <!-- Certificate Section -->
    <p>Paste your M-Pesa statement below to generate your award certificate:</p>
    <textarea id="mpesaStatement" rows="6" placeholder="Paste your M-Pesa payment statement here"></textarea><br>
    <button onclick="generateCertificate()" style="background:#0a7a4b; color:white; border:none; padding:10px 20px; border-radius:6px;">Generate Certificate</button>

    <div id="certificateArea">
        <h3>🏆 Your Certificate</h3>
        <p id="certificateText" style="background:#e8f5ef; padding:15px; border-left:5px solid #0a7a4b; border-radius:6px;"></p>
    </div>
</html>
