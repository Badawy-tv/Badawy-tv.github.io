
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Certificate</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body{font-family:Arial;background:#f9f9f9;margin:0;padding:0;}
.container{max-width:900px;margin:30px auto;background:white;padding:30px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
.certificate{border:5px double #0b5d3b;padding:40px;position:relative;}
h1{text-align:center;color:#0b5d3b;margin-bottom:10px;}
p{margin:5px 0;font-size:18px;}
.signature{position:absolute;bottom:30px;right:50px;font-size:16px;}
.qr{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);}
</style>
</head>
<body>
<div class="container">
<h2>Certificate Verification</h2>
<div id="cert-display" class="certificate">
<h1>Tajweed Mastery Certificate</h1>
<p id="cname"></p>
<p id="cdob"></p>
<p id="cnid"></p>
<p id="cphone"></p>
<p id="clocation"></p>
<p id="cimam"></p>
<p id="ccourse">Course: Tajweed Mastery</p>
<p id="cdate"></p>
<p id="cid"></p>
<div class="signature">Imam Ahmad Badawy</div>
<div id="qrcode" class="qr"></div>
</div>
<button id="download">Download Certificate (PDF)</button>
<div id="msg" style="margin-top:20px;text-align:center;color:#0b5d3b;"></div>
</div>

<script>
const certData = JSON.parse(localStorage.getItem("certData")||"{}");
const certID = localStorage.getItem("certID")||"";

document.getElementById("cname").innerText="Name: "+certData.name;
document.getElementById("cdob").innerText="DOB: "+certData.dob;
document.getElementById("cnid").innerText="National ID: "+certData.nid;
document.getElementById("cphone").innerText="Phone: "+certData.phone;
document.getElementById("clocation").innerText="Location: "+certData.location+", "+certData.ward+", "+certData.sub+", "+certData.county+", "+certData.country;
document.getElementById("cimam").innerText="Imam: "+certData.imam;
document.getElementById("cdate").innerText="Date: "+new Date().toLocaleDateString();
document.getElementById("cid").innerText="Certificate ID: "+certID;

// Generate QR code
new QRCode(document.getElementById("qrcode"),{text:certID,width:100,height:100});

document.getElementById("download").addEventListener("click",()=>{
  if(!certID){alert("Certificate locked");return;}
  import("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js").then(js=>{
    const { jsPDF } = js.jspdf;
    const doc = new jsPDF();
    doc.html(document.getElementById("cert-display"),{
      callback:function(doc){doc.save(`Certificate-${certData.name.replace(/ /g,"_")}.pdf`);}
    });
  });
});
</script>
</body>
</html>
