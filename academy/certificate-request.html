
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Request</title>
<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:0;}
.container{max-width:800px;margin:40px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2{text-align:center;color:#0b5d3b;}
.form-group{margin-bottom:15px;}
label{display:block;margin-bottom:5px;font-weight:bold;}
input,select{width:100%;padding:10px;border:1px solid #ccc;border-radius:5px;}
button{width:100%;padding:12px;background:#0b5d3b;color:white;border:none;border-radius:5px;font-size:16px;cursor:pointer;}
button:hover{background:#09432b;}
#msg{margin-top:20px;text-align:center;font-weight:bold;color:#0b5d3b;display:none;}
</style>
</head>
<body>

<div class="container">
<h2>Tajweed Certificate Request</h2>

<form id="certificate-form">
<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" id="dob" required>
</div>

<div class="form-group">
<label>National ID / Parent ID</label>
<input type="text" id="nid" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" id="phone">
</div>

<div class="form-group">
<label>Nearby Mosque</label>
<input type="text" id="mosque">
</div>

<div class="form-group">
<label>Name of Imam</label>
<input type="text" id="imam" required>
</div>

<button type="submit">Submit Application</button>
</form>

<div id="msg"></div>

</div>

<script>
document.getElementById("certificate-form").addEventListener("submit", function(e){
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const dob = document.getElementById("dob").value.trim();

    if(!name || !dob){
        alert("Please fill required fields");
        return;
    }

    // Save data
    const data = {
        name:name,
        dob:dob,
        nid:document.getElementById("nid").value,
        phone:document.getElementById("phone").value,
        mosque:document.getElementById("mosque").value,
        imam:document.getElementById("imam").value
    };

    localStorage.setItem("certData", JSON.stringify(data));

    // Generate ID
    const id = "CERT-" + Date.now();
    localStorage.setItem("certID", id);

    // Show message
    const msg = document.getElementById("msg");
    msg.style.display = "block";
    msg.innerText = "⏳ Wait 5 minutes as your credentials are being validated...";

    // Redirect after delay
    setTimeout(function(){
        window.location.href = "payment.html";
    }, 3000);
});
</script>

</body>
</html>
