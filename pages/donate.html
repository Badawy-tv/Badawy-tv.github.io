<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Badawy TV</title>
<style>
body { font-family: Arial, sans-serif; background:#f9f9f9; padding:20px; }
h1, h2 { color:#0a7a4b; text-align:center; }
.cards { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin-top:20px; }
.card { background:#fff; padding:20px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.1); width:250px; text-align:center; transition:transform 0.2s; }
.card:hover { transform:translateY(-5px); }
.card button { background:#0a7a4b; color:white; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer; transition:background 0.2s; }
.card button:hover { background:#065836; }
.copy-text { cursor:pointer; display:inline-block; margin-left:5px; color:#0a7a4b; font-weight:bold; }
</style>
</head>
<body>

<h1>🤲 Support Badawy TV</h1>

<h2>Mpesa Payment</h2>
<div class="cards">
  <div class="card">
    <h3>Mpesa</h3>
    <p>Send to: <strong>0716802090</strong></p>
    <button onclick="openMpesa()">Donate</button>
  </div>
</div>

<h2>Local Banks (Kenya)</h2>
<div class="cards">
  <div class="card">
    <h3>Equity Bank</h3>
    <button onclick="openBank('equity')">Donate</button>
  </div>
  <div class="card">
    <h3>KCB</h3>
    <button onclick="openBank('kcb')">Donate</button>
  </div>
  <div class="card">
    <h3>Co-operative Bank</h3>
    <button onclick="openBank('co-op')">Donate</button>
  </div>
  <div class="card">
    <h3>Other Banks</h3>
    <button onclick="openBank('other')">Donate</button>
  </div>
</div>

<h2>Global Payments</h2>
<p style="text-align:center;">Use email: <strong id="globalEmail">ahmedbadawy786@gmail.com</strong> <span class="copy-text" onclick="copyEmail()">📋 Copy</span></p>
<div class="cards">
  <div class="card">
    <h3>PayPal</h3>
    <button onclick="openGlobal('paypal')">Donate</button>
  </div>
  <div class="card">
    <h3>Visa / Mastercard</h3>
    <button onclick="openGlobal('visa')">Donate</button>
  </div>
  <div class="card">
    <h3>Stripe</h3>
    <button onclick="openGlobal('stripe')">Donate</button>
  </div>
  <div class="card">
    <h3>Other Methods</h3>
    <button onclick="openGlobal('other')">Donate</button>
  </div>
</div>

<script>
// Clipboard copy for global email
function copyEmail() {
  const email = document.getElementById('globalEmail').textContent;
  navigator.clipboard.writeText(email).then(() => alert(`Email copied: ${email}`));
}

// Open Mpesa app or fallback to store only
function openMpesa() {
  const scheme = "mpesa://"; 
  const playstore = "https://play.google.com/store/apps/details?id=com.safaricom.mpesa&hl=en";
  const appstore = "https://apps.apple.com/ke/app/mpesa/id472066175";
  openAppOrStore(scheme, playstore, appstore);
}

// Open local bank app or fallback store only
function openBank(bank) {
  let scheme = "", playstore = "", appstore = "";
  switch(bank) {
    case 'equity':
      scheme = "equitybank://"; 
      playstore="https://play.google.com/store/apps/details?id=com.equity.android"; 
      appstore="https://apps.apple.com/ke/app/equity-mobile/id123456";
      break;
    case 'kcb':
      scheme="kcb://"; 
      playstore="https://play.google.com/store/apps/details?id=com.kcb.mobile"; 
      appstore="https://apps.apple.com/ke/app/kcb-mobile/id123456";
      break;
    case 'co-op':
      scheme="coop://"; 
      playstore="https://play.google.com/store/apps/details?id=com.coopbank"; 
      appstore="https://apps.apple.com/ke/app/co-op-bank/id123456";
      break;
    case 'other':
      playstore="https://play.google.com/store/apps/details?id=com.centralbank"; 
      appstore="https://apps.apple.com/ke/app/central-bank/id123456";
  }
  openAppOrStore(scheme, playstore, appstore);
}

// Open global payment app or fallback store only
function openGlobal(method) {
  const email = document.getElementById('globalEmail').textContent;
  copyEmail(); 
  let scheme="", playstore="", appstore="";
  switch(method) {
    case 'paypal': scheme="paypal://send?recipient="+email; break;
    case 'visa': scheme="stripe://"; break;
    case 'stripe': scheme="stripe://"; break;
    case 'other': scheme="mailto:"+email; break;
  }
  openAppOrStore(scheme, "https://play.google.com/store/", "https://apps.apple.com/");
}

// Generic open app or store function
function openAppOrStore(scheme, playstore, appstore) {
  if(scheme){
    window.location = scheme;
    setTimeout(()=>{ 
      // fallback to store after delay
      if(navigator.userAgent.includes("Android")) window.location=playstore;
      if(navigator.userAgent.includes("iPhone") || navigator.userAgent.includes("iPad")) window.location=appstore;
    }, 1500);
  } else {
    alert("App not detected, please install from store.");
  }
}
</script>

</body>
</html>
