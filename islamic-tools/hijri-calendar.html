<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hijri Calendar</title>

<link rel="stylesheet" href="css/tools.css">

<style>

body{
font-family:Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:15px;
}

.calendar{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

#monthTitle{
text-align:center;
font-size:22px;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
text-align:center;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#eee;
}

.today{
background:#4caf50;
color:white;
font-weight:bold;
}

.months{
margin-top:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.month-btn{
padding:10px;
background:#6a5acd;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.month-btn:hover{
background:#4b3db5;
}

/* MOBILE OPTIMIZATION */

@media(max-width:600px){

th,td{
padding:6px;
font-size:12px;
}

h1{
font-size:20px;
}

#monthTitle{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="calendar">

<h1>📅 Hijri Calendar</h1>

<div id="monthTitle"></div>

<table>
<thead>
<tr>
<th>Sun</th>
<th>Mon</th>
<th>Tue</th>
<th>Wed</th>
<th>Thu</th>
<th>Fri</th>
<th>Sat</th>
</tr>
</thead>

<tbody id="calendarDays"></tbody>
</table>

<div class="months" id="monthsList"></div>

</div>

<script>

const hijriMonths=[
"Muharram",
"Safar",
"Rabi al-Awwal",
"Rabi al-Thani",
"Jumada al-Awwal",
"Jumada al-Thani",
"Rajab",
"Sha'ban",
"Ramadan",
"Shawwal",
"Dhul-Qadah",
"Dhul-Hijjah"
];

let currentDay;
let currentMonth;
let currentYear;

function getHijriToday(){

const today=new Date();

const parts=new Intl.DateTimeFormat('en-TN-u-ca-islamic',{
day:'numeric',
month:'numeric',
year:'numeric'
}).formatToParts(today);

parts.forEach(p=>{
if(p.type==="day") currentDay=parseInt(p.value);
if(p.type==="month") currentMonth=parseInt(p.value);
if(p.type==="year") currentYear=p.value;
});

}

function buildCalendar(month){

document.getElementById("monthTitle").innerText=
hijriMonths[month-1]+" "+currentYear+" AH";

const days=30;

let tbody=document.getElementById("calendarDays");
tbody.innerHTML="";

let row=document.createElement("tr");

for(let i=1;i<=days;i++){

let cell=document.createElement("td");
cell.innerText=i;

if(month===currentMonth && i===currentDay){
cell.className="today";
}

row.appendChild(cell);

if(row.children.length===7){

tbody.appendChild(row);
row=document.createElement("tr");

}

}

tbody.appendChild(row);

}

function buildMonths(){

const container=document.getElementById("monthsList");

hijriMonths.forEach((m,i)=>{

let btn=document.createElement("button");
btn.className="month-btn";
btn.innerText=m;

btn.onclick=()=>{

buildCalendar(i+1);

};

container.appendChild(btn);

});

}

getHijriToday();

buildCalendar(currentMonth);

buildMonths();

</script>

</body>
</html>
