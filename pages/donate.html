<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate - Badawy TV</title>
<style>
body { font-family: Arial, sans-serif; background:#f9f9f9; padding:20px; }
h1,h2 { color:#0a7a4b; text-align:center; }
.card { background:white; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); padding:20px; margin:20px auto; max-width:600px; transition: transform 0.2s; }
.card:hover { transform: translateY(-5px); box-shadow:0 10px 25px rgba(0,0,0,0.15); }
.button { background:#0a7a4b; color:white; border:none; padding:12px 25px; border-radius:6px; font-weight:bold; cursor:pointer; }
.button:hover { background:#095d38; }
.copy-btn { margin-left:10px; padding:6px 12px; font-size:0.9em; }
.note { font-size:0.95em; color:#555; text-align:center; margin-top:10px; }
</style>
</head>
<body>

<h1>🤲 Support Badawy TV</h1>

<!-- M-Pesa Section -->
<div class="card">
  <h2>M-PESA</h2>
  <p><strong>Number:</strong> 0716802090 
     <button class="copy-btn" onclick="copyText('0716802090')">📋 Copy</button>
  </p>
</div>

<!-- Local Banks Section -->
<div class="card">
  <h2>LOCAL BANKS</h2>
  <p>Select your bank and press Donate:</p>
  <ul style="list-style:none; padding:0;">
    <li><button class="button" onclick="openBank('https://www.stanbicbank.co.ke/personal-banking/payments')">Stanbic Bank Donate</button></li>
    <li><button class="button" onclick="openBank('https://www.absa.co.ke/personal/payments')">ABSA Bank Donate</button></li>
    <li><button class="button" onclick="openBank('https://www.kcbgroup.com/personal/payments')">KCB Bank Donate</button></li>
    <li><button class="button" onclick="openBank('https://www.co-opbank.co.ke/personal-banking/payments')">Co-Operative Bank Donate</button></li>
  </ul>
</div>

<!-- Global Payments Section -->
<div class="card">
  <h2>GLOBAL PAYMENTS</h2>
  <p class="note">Use the email <strong>ahmedbadawy786@gmail.com</strong> for global payments.</p>
  <button class="button" onclick="globalDonate()">Donate</button>
</div>

<script>
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!'));
}

// Local Banks open link or app fallback
function openBank(url) {
  window.open(url, '_blank');
}

// Global Payments logic
function globalDonate() {
  const email = 'ahmedbadawy786@gmail.com';
  navigator.clipboard.writeText(email).then(() => alert('Email copied to clipboard!'));
  
  // Attempt to open PayPal or Visa app deep link (example)
  const appUrl = 'paypal://send?recipient=' + email;
  const fallbackWeb = 'https://www.paypal.com/paypalme/' + email.split('@')[0];

  // Try to open app, fallback to web after short delay
  const timeout = setTimeout(() => window.open(fallbackWeb, '_blank'), 500);
  window.location = appUrl;
}
</script>

</body>
</html>
