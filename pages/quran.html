<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BADAWY TV Quran</title>

<style>

body{
font-family:Arial;
background:#f4f1ea;
margin:0;
}

.header{
background:#0b7a4d;
color:white;
padding:15px;
font-size:20px;
text-align:center;
}

.controls{
padding:10px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

button,select,input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

#mushaf{
max-width:900px;
margin:auto;
padding:20px;
background:white;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.ayah{
padding:12px;
border-bottom:1px solid #eee;
}

.arabic{
font-size:26px;
text-align:right;
font-family:serif;
line-height:1.8;
}

.translation{
font-size:14px;
color:#555;
margin-top:6px;
}

.play{
margin-top:6px;
}

.current{
background:#fff3cd;
border-left:6px solid #0b7a4d;
}

</style>
</head>

<body>

<div class="header">
BADAWY TV — Quran Reader
</div>

<div class="controls">
<select id="surahSelect"></select>
<select id="reciterSelect">
<option value="ar.alafasy">Mishary Alafasy</option>
<option value="ar.abdurrahmaansudais">Sudais</option>
<option value="ar.husary">Husary</option>
</select>

<button onclick="playSurah()">▶ Play</button>
<button onclick="stopAudio()">⏹ Stop</button>
</div>

<div id="mushaf">
Loading Quran...
</div>

<audio id="player" controls style="width:100%"></audio>

<script>

const surahSelect=document.getElementById("surahSelect")
const mushaf=document.getElementById("mushaf")
const player=document.getElementById("player")
const reciterSelect=document.getElementById("reciterSelect")

let currentSurah=1
let currentAyah=1
let totalAyah=0

async function loadSurahs(){

let res=await fetch("https://api.alquran.cloud/v1/surah")
let data=await res.json()

surahSelect.innerHTML=""

data.data.forEach(s=>{

let o=document.createElement("option")
o.value=s.number
o.textContent=s.number+" - "+s.englishName
surahSelect.appendChild(o)

})

}

async function loadSurah(){

currentSurah=surahSelect.value

let res=await fetch("https://api.alquran.cloud/v1/surah/"+currentSurah+"/editions/quran-uthmani,en.asad")
let json=await res.json()

let arabic=json.data[0].ayahs
let trans=json.data[1].ayahs

totalAyah=arabic.length

mushaf.innerHTML=""

arabic.forEach((a,i)=>{

let div=document.createElement("div")
div.className="ayah"
div.id="ayah"+(i+1)

div.innerHTML=
"<div class='arabic'>"+a.text+"</div>"+
"<div class='translation'>"+trans[i].text+"</div>"+
"<button class='play' onclick='playAyah("+(i+1)+")'>▶ Play</button>"

mushaf.appendChild(div)

})

}

function playAyah(num){

currentAyah=num

let reciter=reciterSelect.value

let ayah=String(num).padStart(3,"0")

player.src="https://cdn.islamic.network/quran/audio/128/"+reciter+"/"+currentSurah+ayah+".mp3"

highlight(num)

player.play()

}

function highlight(n){

document.querySelectorAll(".ayah").forEach(a=>a.classList.remove("current"))

let el=document.getElementById("ayah"+n)

if(el){
el.classList.add("current")
el.scrollIntoView({behavior:"smooth",block:"center"})
}

}

player.addEventListener("ended",()=>{

currentAyah++

if(currentAyah<=totalAyah){

playAyah(currentAyah)

}

})

function playSurah(){

currentAyah=1
playAyah(1)

}

function stopAudio(){

player.pause()

}

surahSelect.addEventListener("change",loadSurah)

loadSurahs().then(loadSurah)

</script>

</body>
</html>
