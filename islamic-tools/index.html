<section class="tool-card">


<div id="location"></div>

<div id="nextPrayer" style="font-size:20px;margin-top:10px;"></div>

<div id="countdown" style="font-size:28px;color:gold;margin:10px 0;"></div>

<div id="prayerTimes"></div>

</section>

<script>


navigator.geolocation.getCurrentPosition(async function(pos){

const lat=pos.coords.latitude
const lon=pos.coords.longitude

const geo=await fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude="+lat+"&longitude="+lon+"&localityLanguage=en")
const geoData=await geo.json()

document.getElementById("location").innerText=
geoData.city+", "+geoData.countryName

const res=await fetch("https://api.aladhan.com/v1/timings?latitude="+lat+"&longitude="+lon+"&method=2")

const data=await res.json()

prayerTimes=data.data.timings

displayTimes()

startCountdown()

})

}

function displayTimes(){

let html=""

prayers.forEach(p=>{

html+=p+" : "+prayerTimes[p]+"<br>"

})

document.getElementById("prayerTimes").innerHTML=html

}

function startCountdown(){

setInterval(function(){

const now=new Date()

let next=null
let nextName=""

for(let p of prayers){

let t=prayerTimes[p].split(":")

let prayerDate=new Date()

prayerDate.setHours(t[0])
prayerDate.setMinutes(t[1])
prayerDate.setSeconds(0)

if(prayerDate>now){
next=prayerDate
nextName=p
break
}

}

if(!next){

let t=prayerTimes["Fajr"].split(":")

next=new Date()

next.setDate(now.getDate()+1)

next.setHours(t[0])
next.setMinutes(t[1])

nextName="Fajr"

}

let diff=next-now

let h=Math.floor(diff/1000/60/60)
let m=Math.floor(diff/1000/60)%60
let s=Math.floor(diff/1000)%60

document.getElementById("nextPrayer").innerText="Next Prayer: "+nextName

document.getElementById("countdown").innerText=
h+"h "+m+"m "+s+"s"

},1000)

}

loadPrayerTimes()

</script>

<div id="floatingPrayerBar">
🕌 Next Prayer: <span id="nextPrayerName">Loading...</span>
 | ⏳ <span id="prayerCountdown">--</span>
</div>

<script>

const prayers=["Fajr","Dhuhr","Asr","Maghrib","Isha"];

async function initPrayerBar(){

try{

const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej));

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

const r=await fetch("https://api.aladhan.com/v1/timings?latitude="+lat+"&longitude="+lon+"&method=2");
const data=await r.json();

const times=data.data.timings;

startCountdown(times);

}catch(e){

document.getElementById("nextPrayerName").textContent="Location blocked";

}

}

function startCountdown(times){

setInterval(()=>{

const now=new Date();

let nextName="";
let nextTime=null;

for(let p of prayers){

let [h,m]=times[p].split(":");

let t=new Date();
t.setHours(h,m,0);

if(t>now){
nextName=p;
nextTime=t;
break;
}

}

if(!nextTime){

let [h,m]=times["Fajr"].split(":");

nextTime=new Date();
nextTime.setDate(now.getDate()+1);
nextTime.setHours(h,m,0);

nextName="Fajr";

}

let diff=nextTime-now;

let h=Math.floor(diff/1000/60/60);
let m=Math.floor(diff/1000/60)%60;
let s=Math.floor(diff/1000)%60;

document.getElementById("nextPrayerName").textContent=nextName;
document.getElementById("prayerCountdown").textContent=h+"h "+m+"m "+s+"s";

},1000);

}

initPrayerBar();

</script>
