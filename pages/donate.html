<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Badawy TV</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
h1,h2 { text-align:center; color:#0a7a4b; }

.section { margin:40px 0; }
.cards { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }

.card {
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:250px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button {
  background:#0a7a4b;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:6px;
  cursor:pointer;
}

/* Certificate */
#certificateArea {
  display:none;
  margin-top:20px;
  padding:30px;
  background:white;
  border:8px solid #0a7a4b;
  position:relative;
}

.watermark {
  position:absolute;
  opacity:0.05;
  font-size:30px;
  transform:rotate(-30deg);
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🤲 Support Badawy TV</h1>

<!-- PAYMENT SECTION -->
<div class="section">
<h2>Mpesa</h2>
<div class="cards">
<div class="card">
<p>0716802090</p>
<button onclick="navigator.clipboard.writeText('0716802090')">Copy</button>
<button onclick="openApp('mpesa://','https://play.google.com/store/apps/details?id=com.safaricom.mpesa')">Donate</button>
</div>
</div>

<h2>Local Banks</h2>
<div class="cards">
<div class="card"><h3>Equity</h3><button onclick="openApp('equitybank://','https://play.google.com/store/apps/details?id=com.equity.android')">Donate</button></div>
<div class="card"><h3>KCB</h3><button onclick="openApp('kcb://','https://play.google.com/store/apps/details?id=com.kcb.mobile')">Donate</button></div>
<div class="card"><h3>Co-op</h3><button onclick="openApp('coop://','https://play.google.com/store/apps/details?id=com.coopbank')">Donate</button></div>
</div>

<h2>Global Payments</h2>
<div class="cards">
<div class="card">
<p>Email: ahmedbadawy786@gmail.com</p>
<button onclick="globalPay()">Donate</button>
</div>
</div>
</div>

<!-- CERTIFICATE -->
<div class="section">
<h2>Generate Certificate</h2>
<textarea id="mpesaStatement" placeholder="Paste statement"></textarea>
<button onclick="generateCertificate()">Generate Certificate</button>

<div id="certificateArea">
<div class="watermark">Badawy TV</div>

<h2 style="text-align:center;">🏆 CERTIFICATE OF SUPPORT</h2>
<p id="certText"></p>

<input id="name" placeholder="Recipient Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">

<p id="certID"></p>

<button id="downloadBtn" disabled onclick="downloadPDF()">Download PDF</button>
</div>
</div>

<!-- SUBMIT -->
<div class="section">
<h2>Submit Certificate</h2>
<input id="s_name" placeholder="Name">
<input id="s_phone" placeholder="Phone">
<input type="file" id="file">
<textarea id="feature" placeholder="Feature request"></textarea>
<button onclick="submitForm()">Submit</button>
</div>

<script>

function openApp(app, store){
  window.location = app;
  setTimeout(()=>window.location=store,1500);
}

function globalPay(){
  navigator.clipboard.writeText("ahmedbadawy786@gmail.com");
  window.location="mailto:ahmedbadawy786@gmail.com";
}

function generateCertificate(){
  const now=new Date();
  document.getElementById("certificateArea").style.display="block";
  document.getElementById("certText").innerText="Awarded for supporting Badawy TV on "+now.toLocaleString();
  document.getElementById("certID").innerText="ID-"+Date.now();
}

document.querySelectorAll("#name,#phone,#email").forEach(el=>{
  el.addEventListener("input",()=>{
    const filled = name.value && phone.value && email.value;
    document.getElementById("downloadBtn").disabled=!filled;
  });
});

async function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const canvas = await html2canvas(document.getElementById("certificateArea"));
  const img = canvas.toDataURL("image/png");
  const pdf = new jsPDF();
  pdf.addImage(img,'PNG',0,0,210,297);
  pdf.save("certificate.pdf");
}

function submitForm(){
  alert("Submitted successfully!");
  alert("Your submission has been received successfully. Our team will review your certificate and details within 24 hours. You will receive feedback shortly. Thank you for supporting Badawy TV.");
  window.location="mailto:badawytv76@gmail.com";
}

</script>

</body>
</html>
