<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qibla Direction</title>

<link rel="stylesheet" href="css/tools.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
text-align:center;
margin:0;
padding:20px;
}

.container{
max-width:650px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#location{
margin-bottom:20px;
font-weight:bold;
}

/* compass */

.compass{
width:260px;
height:260px;
margin:auto;
border-radius:50%;
position:relative;
border:8px solid #c8a96a;
background:radial-gradient(circle,#fff 60%,#f2e5c6);
}

/* decorative ring */

.compass:before{
content:"";
position:absolute;
top:-14px;
left:-14px;
right:-14px;
bottom:-14px;
border-radius:50%;
border:4px dashed #c8a96a;
}

/* directions */

.dir{
position:absolute;
font-weight:bold;
font-size:16px;
}

.n{top:-25px;left:50%;transform:translateX(-50%)}
.s{bottom:-25px;left:50%;transform:translateX(-50%)}
.e{right:-25px;top:50%;transform:translateY(-50%)}
.w{left:-25px;top:50%;transform:translateY(-50%)}

/* kaaba pointer */

.arrow{
position:absolute;
top:50%;
left:50%;
width:40px;
height:40px;
background:url("https://upload.wikimedia.org/wikipedia/commons/3/3d/Kaaba_icon.svg") center/contain no-repeat;
transform-origin:50% 120%;
transform:translate(-50%,-120%) rotate(0deg);
transition:transform 0.2s linear;
}

/* center */

.center{
width:12px;
height:12px;
background:#333;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#map{
height:300px;
margin-top:20px;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px 16px;
border:none;
border-radius:6px;
background:#2e7d32;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>🧭 Qibla Direction</h1>

<div id="location">Detecting location...</div>

<button id="motionBtn">Enable Compass</button>

<div class="compass">

<div class="dir n">N</div>
<div class="dir s">S</div>
<div class="dir e">E</div>
<div class="dir w">W</div>

<div id="arrow" class="arrow"></div>
<div class="center"></div>

</div>

<div id="directionText"></div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const KAABA_LAT=21.4225;
const KAABA_LON=39.8262;
let qiblaBearing=0;

function toRad(d){return d*Math.PI/180}
function toDeg(r){return r*180/Math.PI}

function calculateQibla(lat,lon){
const φ1=toRad(lat);
const φ2=toRad(KAABA_LAT);
const Δλ=toRad(KAABA_LON-lon);

const y=Math.sin(Δλ)*Math.cos(φ2);
const x=Math.cos(φ1)*Math.sin(φ2)-
Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);

let θ=Math.atan2(y,x);
θ=toDeg(θ);
return (θ+360)%360;
}

function rotateArrow(heading){
const rotation=qiblaBearing-heading;
document.getElementById("arrow").style.transform=
"translate(-50%,-120%) rotate("+rotation+"deg)";
}

function handleOrientation(event){
let heading;

if(event.webkitCompassHeading){
heading=event.webkitCompassHeading;
}else if(event.alpha!==null){
heading=360-event.alpha;
}else{
return;
}

rotateArrow(heading);
}

function enableCompass(){
if(typeof DeviceOrientationEvent.requestPermission==="function"){
DeviceOrientationEvent.requestPermission().then(response=>{
if(response==="granted"){
window.addEventListener("deviceorientation",handleOrientation,true);
}
}).catch(console.error);
}else{
window.addEventListener("deviceorientationabsolute",handleOrientation,true);
window.addEventListener("deviceorientation",handleOrientation,true);
}
}

function start(){
navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

document.getElementById("location").innerText="📍 Your Location";

qiblaBearing=calculateQibla(lat,lon);

document.getElementById("directionText").innerText=
"Qibla: "+qiblaBearing.toFixed(1)+"°";

},()=>{
const lat=-1.286389;
const lon=36.817223;

document.getElementById("location").innerText="📍 Default: Nairobi";

qiblaBearing=calculateQibla(lat,lon);

document.getElementById("directionText").innerText=
"Qibla: "+qiblaBearing.toFixed(1)+"°";
});
}

document.getElementById("motionBtn").addEventListener("click",enableCompass);

start();
</script>

</body>
</html>
