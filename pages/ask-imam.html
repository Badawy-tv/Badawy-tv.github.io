<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Imam - Islamic Guidance</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<style>
  .form-container {
    max-width: 600px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #f9f9f9;
  }
  .form-container h2 { text-align: center; margin-bottom: 20px; }
  .form-container label { display: block; margin-top: 10px; font-weight: bold; }
  .form-container input, .form-container textarea, .form-container button {
    width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc;
  }
  .form-container textarea { resize: vertical; height: 120px; }
  .send-options { display: none; margin-top: 15px; text-align: center; }
  .send-options a { display: inline-block; margin: 5px; padding: 10px 15px; background: #1e90ff; color: #fff; text-decoration: none; border-radius: 6px; font-weight: bold; }
</style>
</head>
<body>
<div class="form-container">
  <h2>Ask Imam</h2>
  <p>Submit your question about Islamic family guidance. The Imam will respond via Email or WhatsApp.</p>
  <form id="ask-imam-form">
    <label for="name">Name</label>
    <input type="text" id="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" required>

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" required>

    <label for="question">Question</label>
    <textarea id="question" required></textarea>

    <button type="submit">Submit</button>
  </form>

  <div class="send-options" id="contact-options">
    <a id="send-whatsapp" href="#" target="_blank">Send via WhatsApp</a>
    <a id="send-email" href="#">Send via Email</a>
  </div>
</div>

<script>
document.getElementById("ask-imam-form").addEventListener("submit", function(e) {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const question = document.getElementById("question").value.trim();

  const message = `Assalamu Alaikum wa Rahmatullahi wa Barakatuh,%0A%0AName: ${name}%0AEmail: ${email}%0APhone: ${phone}%0AQuestion: ${question}%0A%0AJazakum Allahu Khairan.`;

  document.getElementById("contact-options").style.display = "block";
  document.getElementById("send-whatsapp").href = `https://wa.me/254716802090?text=${message}`;
  document.getElementById("send-email").href = `mailto:ahmedbadawy786@gmail.com?subject=Ask Imam Question&body=${message}`;
});
</script>
</body>
</html>
