<h1>Entering House</h1>

<p><strong>Arabic:</strong></p>
<p style="font-size:22px;">اللّهُـمَّ إِنِّي أَسْأَلُكَ خَيْرَ المَوْلِجِ وَخَيْرَ المَخْرَج</p>

<p><strong>Translation:</strong></p>
<p>O Allah, I ask You for the best entrance and best exit.</p>

<p><strong>Reference:</strong> Abu Dawud</p>
