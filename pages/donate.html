<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate & Generate Certificate - Badawy TV</title>
<style>
body { font-family: Arial, sans-serif; background:#f9f9f9; padding:20px; }
.payment-card { max-width:800px; margin:0 auto; background:#e8f5ef; padding:30px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.08); }
h1 { text-align:center; color:#0a7a4b; }
button { padding:10px 20px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; }
#certificateArea { display:none; margin-top:20px; padding:20px; border:5px solid #0a7a4b; border-radius:12px; background:linear-gradient(120deg,#ffffff,#e8f5ef); position:relative; }
.certificate-watermark { position:absolute; top:50%; left:50%; font-size:40px; color:rgba(0,0,0,0.05); transform:translate(-50%,-50%) rotate(-45deg); white-space:nowrap; pointer-events:none; user-select:none; }
.certificate-content { position:relative; z-index:1; text-align:center; }
input, textarea { padding:8px; margin:5px 0; border-radius:6px; border:1px solid #ccc; width:80%; max-width:300px; }
#downloadPdf { background:#ccc; color:white; margin-top:15px; }
#downloadPdf.enabled { background:red; cursor:pointer; }
</style>
</head>
<body>

<div class="payment-card">
<h1>🤲 Support Badawy TV</h1>
<p style="text-align:center;">Your support helps maintain and improve <strong>Badawy TV</strong>. Contributions enable new features and app development.</p>

<!-- Certificate Generation -->
<p>Paste your M-Pesa statement below to generate your award certificate:</p>
<textarea id="mpesaStatement" rows="6" placeholder="Paste your M-Pesa payment statement here"></textarea><br>
<button onclick="generateCertificate()" style="background:#0a7a4b; color:white;">Generate Certificate</button>

<div id="certificateArea">
    <div class="certificate-watermark">Certificate Award for Supporting Badawy TV</div>
    <div class="certificate-content">
        <h2>🏆 Award Certificate</h2>
        <p id="certificateText"></p>
        <input type="text" id="userName" placeholder="Your Name"><br>
        <input type="text" id="userPhone" placeholder="Phone Number"><br>
        <input type="email" id="userEmail" placeholder="Email Address"><br>
        <button id="downloadPdf">Download PDF</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// Generate certificate (no validation)
function generateCertificate() {
    const statement = document.getElementById('mpesaStatement').value;
    const now = new Date();
    const uniqueID = 'BADAWY-'+now.getTime();
    document.getElementById('certificateText').innerHTML = `
        You have successfully received an award certificate from Badawy TV for supporting the channel!<br>
        Certificate ID: ${uniqueID}<br>
        Generated at: ${now.toLocaleString()}
    `;
    document.getElementById('certificateArea').style.display='block';
    checkPdfButton();
}

// Enable PDF button when all fields filled
function checkPdfButton() {
    const name = document.getElementById('userName');
    const phone = document.getElementById('userPhone');
    const email = document.getElementById('userEmail');
    const pdfBtn = document.getElementById('downloadPdf');
    function toggleButton() {
        if(name.value && phone.value && email.value) {
            pdfBtn.classList.add('enabled');
        } else {
            pdfBtn.classList.remove('enabled');
        }
    }
    name.addEventListener('input', toggleButton);
    phone.addEventListener('input', toggleButton);
    email.addEventListener('input', toggleButton);

    pdfBtn.addEventListener('click', function() {
        if(!pdfBtn.classList.contains('enabled')) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const content = document.querySelector('.certificate-content').innerText;
        doc.setFontSize(16);
        doc.text(content, 10, 20);
        doc.save('BadawyTV_Certificate.pdf');
    });
}
</script>

</div>
</body>
</html>
