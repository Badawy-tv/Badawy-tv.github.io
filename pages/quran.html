<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran Reader | Badawy TV</title>

<link rel="stylesheet" href="../assets/css/layout.css">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/responsive.css">

<style>

.quran-container{
max-width:900px;
margin:auto;
padding:30px;
}

.quran-controls{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.quran-controls select,
.quran-controls input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.ayah{
margin-bottom:22px;
padding-bottom:12px;
border-bottom:1px solid #eee;
}

.arabic{
font-size:28px;
text-align:right;
font-family:'Scheherazade', serif;
line-height:1.9;
}

.translation{
font-size:16px;
color:#444;
margin-top:6px;
}

audio{
margin-top:6px;
width:100%;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="quran-container">

<h1>📖 Holy Quran</h1>
<p>Read, listen and reflect upon the Quran.</p>

<div class="quran-controls">

<select id="surah-select"></select>

<select id="reciter-select">

<option value="ar.alafasy">Mishary Alafasy</option>
<option value="ar.abdurrahmaansudais">Abdul Rahman Al-Sudais</option>
<option value="ar.husary">Mahmoud Khalil Al-Husary</option>

</select>

<input type="number" id="ayah-input" placeholder="Ayah #" min="1">

<button id="load-surah">Load</button>

</div>

<div id="verses"></div>

</div>

<script src="../assets/js/quran-reader.js"></script>
<script src="../assets/js/components.js"></script>

</body>
</html>
