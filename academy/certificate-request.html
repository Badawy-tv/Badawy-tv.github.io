
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tajweed Certificate Request</title>
<style>
body{font-family:Arial, sans-serif;background:#f9f9f9;margin:0;padding:0;}
.container{max-width:800px;margin:50px auto;background:white;padding:30px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h2{text-align:center;color:#0b5d3b;}
.form-group{margin-bottom:15px;}
label{display:block;font-weight:bold;margin-bottom:5px;}
input, select{width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;}
button{background:#0b5d3b;color:white;padding:12px 20px;border:none;border-radius:6px;cursor:pointer;font-size:16px;}
button:hover{background:#09432b;}
</style>
</head>
<body>
<div class="container">
<h2>Tajweed Mastery Certificate Request</h2>
<form id="cert-form">
<div class="form-group"><label>Full Name</label><input type="text" id="name" required></div>
<div class="form-group"><label>Date of Birth</label><input type="date" id="dob" required></div>
<div class="form-group"><label>National ID / Parent ID</label><input type="text" id="nid" required></div>
<div class="form-group"><label>Phone Number</label><input type="tel" id="phone"></div>
<div class="form-group"><label>Nearby Mosque</label><input type="text" id="mosque"></div>
<div class="form-group"><label>Name of Imam</label><input type="text" id="imam" required></div>
<div class="form-group"><label>Country</label>
<select id="country" required>
<option value="">Select Country</option>
<option value="Kenya">Kenya</option>
<option value="Uganda">Uganda</option>
<option value="Tanzania">Tanzania</option>
</select>
</div>
<div class="form-group"><label>County</label><select id="county" required></select></div>
<div class="form-group"><label>Subcounty</label><select id="subcounty" required></select></div>
<div class="form-group"><label>Ward</label><select id="ward" required></select></div>
<div class="form-group"><label>Location</label><input type="text" id="location" required></div>
<div class="form-group"><label>Guardian / Parent Phone</label><input type="tel" id="guardian"></div>
<button type="submit">Submit</button>
</form>
<div id="message" style="margin-top:20px;text-align:center;color:#0b5d3b;"></div>
</div>

<script>
// --- Cascading Locations ---
const data = {
  Kenya: {
    Nairobi: { "Westlands": [], "Kibra": [], "Langata": [] },
    Mombasa: { "Mvita": [], "Kisauni": [], "Likoni": [] },
    Kisumu: { "Kisumu East": [], "Kisumu West": [] },
    Nakuru: { "Nakuru Town East": [], "Nakuru Town West": [] },
    Kiambu: { "Kiambu": [], "Thika": [] }
  },
  Uganda: { Kampala: { "Central": [], "Nakawa": [] }, Wakiso: { "Entebbe": [] } },
  Tanzania: { Dar: { "Kinondoni": [], "Ilala": [] }, Arusha: { "Arusha Urban": [] } }
};

const countryEl = document.getElementById("country");
const countyEl = document.getElementById("county");
const subEl = document.getElementById("subcounty");
const wardEl = document.getElementById("ward");

countryEl.addEventListener("change", function(){
  countyEl.innerHTML = '<option value="">Select County</option>';
  subEl.innerHTML = '<option value="">Select Subcounty</option>';
  wardEl.innerHTML = '<option value="">Select Ward</option>';
  if(this.value && data[this.value]){
    Object.keys(data[this.value]).forEach(c=>{countyEl.innerHTML += `<option value="${c}">${c}</option>`;});
  }
});

countyEl.addEventListener("change", function(){
  subEl.innerHTML = '<option value="">Select Subcounty</option>';
  wardEl.innerHTML = '<option value="">Select Ward</option>';
  const country = countryEl.value;
  if(country && this.value && data[country][this.value]){
    Object.keys(data[country][this.value]).forEach(s=>{subEl.innerHTML += `<option value="${s}">${s}</option>`;});
  }
});

subEl.addEventListener("change", function(){
  wardEl.innerHTML = '<option value="">Select Ward</option>';
  const country = countryEl.value;
  const county = countyEl.value;
  if(country && county && this.value && data[country][county][this.value]!==undefined){
    // wards are empty, user will fill location manually
  }
});

// --- Form Submit ---
document.getElementById("cert-form").addEventListener("submit", function(e){
  e.preventDefault();
  const name = document.getElementById("name").value;
  const dob = document.getElementById("dob").value;
  const nid = document.getElementById("nid").value;
  const phone = document.getElementById("phone").value;
  const mosque = document.getElementById("mosque").value;
  const imam = document.getElementById("imam").value;
  const country = countryEl.value;
  const county = countyEl.value;
  const sub = subEl.value;
  const ward = wardEl.value;
  const location = document.getElementById("location").value;
  const guardian = document.getElementById("guardian").value;

  // --- Save to localStorage ---
  const certData = {name,dob,nid,phone,mosque,imam,country,county,sub,ward,location,guardian};
  localStorage.setItem("certData",JSON.stringify(certData));

  // --- Generate unique ID ---
  const uniqueId = 'CERT-'+Date.now();
  localStorage.setItem("certID", uniqueId);

  // --- Redirect to payment page ---
  document.getElementById("message").innerText = "Redirecting to payment page...";
  setTimeout(()=>{window.location.href="payment.html";},2000);
});
</script>
</body>
</html>
