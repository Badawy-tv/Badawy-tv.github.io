<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Tasbih</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:"Cairo",sans-serif;
background:
radial-gradient(circle at center,#0f2e23,#050b09),
url("https://www.transparenttextures.com/patterns/arabesque.png");
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
overflow:hidden;
}

h1{
font-family:"Amiri",serif;
color:gold;
margin-bottom:10px;
}

.subtitle{
opacity:.7;
margin-bottom:20px;
font-size:14px;
}

.ring{
position:relative;
width:300px;
height:300px;
animation:rotateRing 40s linear infinite;
}

@keyframes rotateRing{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

.bead{
position:absolute;
width:18px;
height:18px;
border-radius:50%;
background:#145c44;
border:1px solid gold;
box-shadow:0 0 4px rgba(0,0,0,.6);
transition:.2s;
}

.bead.active{
background:gold;
box-shadow:0 0 12px gold;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:130px;
height:130px;
border-radius:50%;
background:radial-gradient(circle,#1f3d30,#0a1a14);
border:3px solid gold;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
color:gold;
cursor:pointer;
}

.controls{
margin-top:30px;
}

button{
background:#145c44;
border:none;
padding:10px 22px;
border-radius:8px;
color:white;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#1d7a5c;
}

.progress{
margin-top:12px;
color:gold;
font-size:14px;
}

.dhikrName{
margin-top:6px;
opacity:.8;
font-size:13px;
}

</style>
</head>

<body>

<h1>Digital Tasbih</h1>
<div class="subtitle">Tap the center to count</div>

<div class="ring" id="ring"></div>

<div class="controls">
<button onclick="resetTasbih()">Reset</button>
</div>

<div class="progress" id="progress"></div>
<div class="dhikrName" id="dhikrName"></div>

<audio id="click">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c7e2f9f2e.mp3">
</audio>

<script>

const ring=document.getElementById("ring")
const progress=document.getElementById("progress")
const dhikrName=document.getElementById("dhikrName")
const click=document.getElementById("click")

const dhikrCycle=[
{name:"SubhanAllah",count:33},
{name:"Alhamdulillah",count:33},
{name:"Allahu Akbar",count:34}
]

let cycleIndex=0
let target=dhikrCycle[0].count
let count=0

const radius=130

for(let i=0;i<33;i++){

let bead=document.createElement("div")
bead.className="bead"

let angle=(i/33)*2*Math.PI

let x=150+radius*Math.cos(angle)
let y=150+radius*Math.sin(angle)

bead.style.left=x+"px"
bead.style.top=y+"px"

ring.appendChild(bead)

}

const center=document.createElement("div")
center.className="center"
center.innerText="0"

ring.appendChild(center)

const beads=document.querySelectorAll(".bead")

function update(){

center.innerText=count

progress.innerText=count+" / "+target
dhikrName.innerText=dhikrCycle[cycleIndex].name

beads.forEach((b,i)=>{

if(i<count) b.classList.add("active")
else b.classList.remove("active")

})

localStorage.setItem("tasbihCount",count)
localStorage.setItem("tasbihCycle",cycleIndex)

}

center.onclick=function(){

count++

click.currentTime=0
click.play()

if(navigator.vibrate) navigator.vibrate(20)

if(count>=target){

cycleIndex++

if(cycleIndex>=dhikrCycle.length){
cycleIndex=0
}

target=dhikrCycle[cycleIndex].count
count=0

}

update()

}

function resetTasbih(){

count=0
cycleIndex=0
target=dhikrCycle[0].count
update()

}

const savedCount=localStorage.getItem("tasbihCount")
const savedCycle=localStorage.getItem("tasbihCycle")

if(savedCount){
count=parseInt(savedCount)
}

if(savedCycle){
cycleIndex=parseInt(savedCycle)
target=dhikrCycle[cycleIndex].count
}

update()

</script>

</body>
</html>
