<div id="certificate-container" style="margin:30px; text-align:center; display:none;">
    <button id="get-certificate" style="
        padding:15px 25px;
        font-size:18px;
        background:#caa84c;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;
    ">📜 Apply for Certificate</button>
</div>

<script>
function checkAllLessonsCompleted() {
    let allDone = true;
    for(let i=1; i<=23; i++) {
        if(!localStorage.getItem("lesson"+i)) {
            allDone = false;
            break;
        }
    }
    if(allDone) {
        document.getElementById("certificate-container").style.display = "block";
    }
}

document.getElementById("get-certificate").addEventListener("click", () => {
    window.location.href="/academy/certificate-request.html";
});

// Run on page load
checkAllLessonsCompleted();
</script>
