<p><strong>Arabic:</strong></p>
<p style="font-size:22px;">أَسْأَلُ اللَّهَ العَظِيمَ رَبَّ العَرْشِ العَظِيمِ أَنْ يَشْفِيَكَ</p>

<p><strong>Translation:</strong></p>
<p>I ask Allah the Mighty to cure you.</p>
