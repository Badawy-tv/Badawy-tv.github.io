<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Imam | Badawy TV</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { font-family: Arial, sans-serif; background:#f4f4f9; margin:0; padding:0; }
.container { max-width:800px; margin:40px auto; background:#fff; padding:30px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1);}
h1 { text-align:center; margin-bottom:20px; color:#1b5e20; }
label { font-weight:bold; margin-top:10px; }
textarea { resize:none; }
.btn { margin-top:10px; }
.contact-options { display:none; margin-top:15px; }
.card-header { font-size:18px; font-weight:bold; color:#fff; background:#1b5e20; padding:10px; border-radius:8px 8px 0 0; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="card-header">🕌 Ask The Imam</div>
    <div class="card-body">
      <p>Have a question about Islamic family guidance? Fill the form below and get answers directly via Email or WhatsApp.</p>
      <form id="ask-imam-form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required class="form-control">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required class="form-control">

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" required class="form-control">

        <label for="question">Question:</label>
        <textarea id="question" name="question" rows="4" required class="form-control"></textarea>

        <button type="submit" class="btn btn-success">Submit</button>
      </form>

      <div class="contact-options">
        <a id="send-whatsapp" href="#" target="_blank" class="btn btn-success">Send via WhatsApp</a>
        <a id="send-email" href="#" class="btn btn-info">Send via Email</a>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('ask-imam-form').addEventListener('submit', function(e){
  e.preventDefault();
  const name = this.querySelector('#name').value;
  const email = this.querySelector('#email').value;
  const phone = this.querySelector('#phone').value;
  const question = this.querySelector('#question').value;

  const message = `Assalamu Alaikum Warahmatullahi Wabarakatuh,%0A%0AName: ${name}%0AEmail: ${email}%0APhone: ${phone}%0AQuestion: ${question}`;

  document.querySelector('.contact-options').style.display = 'block';
  document.getElementById("send-whatsapp").href = `https://api.whatsapp.com/send?phone=254716802090&text=${message}`;
  document.getElementById("send-email").href = `mailto:ahmedbadawy786@gmail.com?subject=Ask Imam Question&body=${message}`;
});
</script>
</body>
</html>
